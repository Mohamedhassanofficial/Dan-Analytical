# Render Blueprint — one-click deploy of the Tadawul Portfolio Optimizer.
#
# Resources declared:
#   1. tadawul-db        Managed Postgres (free tier — 90 days then upgrade)
#   2. tadawul-api       FastAPI web service (Python runtime)
#   3. tadawul-web       Static React site (built with Vite)
#
# Deploy:
#   1. Push this file to main.
#   2. On Render dashboard → "New" → "Blueprint" → connect this repo.
#   3. Render reads this file and provisions all three resources.
#   4. After first deploy, the api service runs `start.sh` which applies
#      migrations and seeds idempotently — Loay can hit the URL straight away.
#
# Env vars marked with `sync: false` must be set manually on the Render
# dashboard (the API URL of the sibling api service goes into the web service's
# VITE_API_BASE_URL after the first deploy).

databases:
  - name: tadawul-db
    plan: free
    databaseName: tadawul
    user: tadawul

services:
  # ── FastAPI backend ───────────────────────────────────────────────────────
  - type: web
    name: tadawul-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: bash ./start.sh
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.10"
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: tadawul-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        # Set to the static-site URL after the first web deploy, e.g.
        # https://tadawul-web.onrender.com — single value or comma-separated.
        sync: false
      - key: ACCESS_TOKEN_TTL_MIN
        value: "120"
      - key: PAYMENT_GATEWAY
        value: disabled
      - key: PYTHONIOENCODING
        value: utf-8
      - key: TZ
        value: Asia/Riyadh

  # ── React frontend (static) ───────────────────────────────────────────────
  # Headers + SPA rewrite routes are configured via the Render dashboard
  # after the first successful deploy (Static Site → Redirects/Rewrites
  # and Headers tabs). Keeping the Blueprint minimal avoids validator
  # rejections on first-time deploys.
  - type: web
    name: tadawul-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: VITE_API_BASE_URL
        # After first api deploy, set to e.g.
        # https://tadawul-api.onrender.com/api/v1
        sync: false

<?xml version="1.0" encoding="UTF-8"?>
<!--
  DAN Analytical brand mark — Arabic variant.

  Same gold medallion as the English version (the medallion's "DAN" is a
  fixed Latin emblem, language-neutral). The wordmark on the side
  switches to "دان التحليلي" — the Arabic brand Loay uses — anchored to
  the right edge of the wordmark area and flowing leftward (Arabic glyph
  runs are RTL by default; we don't add direction="rtl" because that
  combined with text-anchor="end" would push the text into the medallion).

  Loay's note: project named after his son Dan. Treat the logo with care.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" role="img" aria-label="دان التحليلي">
  <defs>
    <linearGradient id="danGoldAr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#f3d575" />
      <stop offset="55%" stop-color="#d4a437" />
      <stop offset="100%" stop-color="#a47820" />
    </linearGradient>
    <linearGradient id="danCreamAr" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#fdf6dc" />
      <stop offset="100%" stop-color="#f3e7b1" />
    </linearGradient>
  </defs>

  <!-- Medallion on the RIGHT (mirrors the EN version's left-anchored
       medallion so AR readers see the wordmark first). -->
  <g transform="translate(200 40)">
    <circle r="34" fill="url(#danGoldAr)" />
    <circle r="28" fill="url(#danCreamAr)" stroke="#a47820" stroke-width="0.8" />
    <text x="0" y="6"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="22"
          font-weight="700"
          fill="#0c1a3c"
          text-anchor="middle"
          letter-spacing="0.5">DAN</text>
    <text x="-12" y="-9"
          font-family="Georgia, serif"
          font-size="6"
          font-weight="700"
          fill="#a47820"
          text-anchor="middle">★</text>
  </g>

  <!-- Arabic wordmark anchored on the RIGHT edge of the wordmark area
       (x=154), flowing leftward. No direction attribute — the browser
       handles Arabic glyph order within each text run. Vertical sizes
       match the EN version: 22 / 11 / 9. -->
  <g transform="translate(0 0)">
    <text x="154" y="36"
          font-family="'IBM Plex Sans Arabic', 'Cairo', 'Tahoma', 'Arial', sans-serif"
          font-size="22"
          font-weight="800"
          fill="#0c1a3c"
          text-anchor="end">دان</text>
    <text x="154" y="56"
          font-family="'IBM Plex Sans Arabic', 'Cairo', 'Tahoma', 'Arial', sans-serif"
          font-size="11"
          font-weight="600"
          fill="#1f3a73"
          text-anchor="end">التحليلي</text>
    <text x="154" y="70"
          font-family="'IBM Plex Sans Arabic', 'Cairo', 'Tahoma', 'Arial', sans-serif"
          font-size="9"
          font-weight="500"
          fill="#5b6f9a"
          text-anchor="end">منصة المحفظة الاستثمارية</text>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<!--
  DAN Analytical brand mark — Arabic variant.

  Same lockup as the official EN logo (gold cursive D with ornamental
  flourish + orange "RIsk" diamond inside the D's loop) but mirrored:
  the gold D moves to the right, the tan panel sits on the left and
  carries the Arabic wordmark "دان التحليلي" (Loay's chosen Arabic
  brand). The medallion content "RIsk" stays Latin — it's a fixed
  emblem the way the gold "D" is.

  When the official high-res asset is supplied, drop it under this same
  filename and every header picks it up automatically.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 90" role="img" aria-label="دان التحليلي">
  <defs>
    <linearGradient id="goldDAr" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#f3d575" />
      <stop offset="50%" stop-color="#c89530" />
      <stop offset="100%" stop-color="#7a5114" />
    </linearGradient>
    <linearGradient id="tanPanelAr" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#ead8b6" />
      <stop offset="100%" stop-color="#cdb88a" />
    </linearGradient>
    <linearGradient id="diamondOrangeAr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#ffb347" />
      <stop offset="100%" stop-color="#d97a18" />
    </linearGradient>
  </defs>

  <!-- Tan/cream panel — left side of the lockup (mirrored vs EN). -->
  <rect x="4" y="4" width="196" height="82" rx="3"
        fill="url(#tanPanelAr)" stroke="#7a5114" stroke-width="0.5" />

  <!-- Cursive D on the right, flipped horizontally so the ornate side
       of the letter still faces outward. -->
  <g transform="translate(280 0) scale(-1 1)">
    <text x="6" y="68"
          font-family="'Snell Roundhand', 'Brush Script MT', 'Lucida Calligraphy', 'Apple Chancery', Georgia, serif"
          font-size="86"
          font-weight="900"
          font-style="italic"
          fill="url(#goldDAr)"
          stroke="#5a3f0e"
          stroke-width="0.6"
          paint-order="stroke fill">D</text>

    <path d="M 14,72 C 4,82 0,90 18,89 C 40,88 60,82 58,70 C 50,75 30,77 18,72"
          fill="url(#goldDAr)"
          stroke="#5a3f0e"
          stroke-width="0.5"
          opacity="0.9" />
  </g>

  <!-- "RIsk" diamond accent — anchored to the actual letter location
       (mirrored x, so x=280-42=238). Text stays upright, not flipped. -->
  <g transform="translate(238 42)">
    <polygon points="0,-13 14,0 0,13 -14,0"
             fill="url(#diamondOrangeAr)"
             stroke="#5a3f0e"
             stroke-width="0.8" />
    <text x="0" y="3"
          text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="9"
          font-weight="700"
          fill="#0c1a3c">R<tspan font-style="italic">I</tspan>sk</text>
  </g>

  <!-- Arabic wordmark on the tan panel. text-anchor='end' anchors the
       text at the right edge of the panel so it flows leftward
       naturally for RTL readers. -->
  <text x="190" y="42"
        font-family="'IBM Plex Sans Arabic', 'Cairo', 'Tahoma', 'Arial', sans-serif"
        font-size="32"
        font-weight="900"
        fill="#0c1a3c"
        text-anchor="end">دان</text>
  <text x="190" y="62"
        font-family="'IBM Plex Sans Arabic', 'Cairo', 'Tahoma', 'Arial', sans-serif"
        font-size="14"
        font-weight="700"
        fill="#0c1a3c"
        text-anchor="end">التحليلي</text>
  <text x="190" y="78"
        font-family="'IBM Plex Sans Arabic', 'Cairo', 'Tahoma', 'Arial', sans-serif"
        font-size="9"
        font-weight="600"
        fill="#0c1a3c"
        text-anchor="end">منصة المحفظة الاستثمارية</text>
</svg>
